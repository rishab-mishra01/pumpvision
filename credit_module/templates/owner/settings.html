{% extends "base.html" %}
{% block title %}Settings — PumpVision Credit{% endblock %}

{% block content %}
<h1 class="text-xl font-bold text-gray-800 mb-4">Settings</h1>

<form method="POST" action="{{ url_for('owner.settings') }}" class="space-y-4">
  <div class="bg-white rounded-xl shadow p-4 space-y-3">
    <h2 class="font-semibold text-gray-700">Credit Alert Threshold</h2>
    <p class="text-sm text-gray-500">
      When a customer's outstanding balance exceeds this percentage of their credit limit,
      they appear in the dashboard alert section.
    </p>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Threshold (%)</label>
      <input type="number" name="alert_threshold" min="0" max="100" step="1"
             value="{{ threshold|int }}"
             class="w-full border border-gray-300 rounded-lg px-4 py-3 text-base focus:ring-2 focus:ring-indigo-500 focus:outline-none">
    </div>
  </div>

  <button type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl">
    Save Settings
  </button>
</form>
{% endblock %}
