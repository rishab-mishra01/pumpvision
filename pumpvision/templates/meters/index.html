{% extends "base.html" %}
{% block title %}Meter Readings — PumpVision{% endblock %}

{% block content %}
<h1 class="text-xl font-bold text-gray-800 mb-4">Meter Readings</h1>

{% if dates %}
<div class="space-y-2">
  {% for d in dates %}
  <a href="{{ url_for('meters.day', date_str=d.strftime('%Y-%m-%d')) }}"
     class="flex items-center justify-between bg-white rounded-xl shadow px-4 py-4">
    <span class="font-medium text-gray-800">{{ d.strftime('%d %b %Y') }}</span>
    <span class="text-indigo-500">›</span>
  </a>
  {% endfor %}
</div>
{% else %}
<div class="bg-white rounded-xl shadow p-8 text-center text-gray-400 text-sm">
  No meter readings submitted yet.
</div>
{% endif %}
{% endblock %}
