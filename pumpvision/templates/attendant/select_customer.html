{% extends "base.html" %}
{% block title %}Select Customer — Pumpvision{% endblock %}

{% block page %}
<style>
  body { background: var(--paper-50); }
  .chip-filter {
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 600;
    padding: 7px 16px;
    border-radius: var(--r-chip);
    border: 1px solid var(--paper-300);
    background: var(--paper-100);
    color: var(--ink-600);
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .chip-filter.active {
    background: var(--ink-900);
    color: var(--paper-50);
    border-color: var(--ink-900);
  }
</style>

<div style="min-height:100dvh;min-height:100vh;display:flex;flex-direction:column;
            padding-bottom:80px;">

  <!-- Top bar -->
  <div style="display:flex;align-items:center;justify-content:space-between;
              padding:18px 20px 12px;">
    <a href="{{ url_for('attendant.home') }}"
       style="display:flex;align-items:center;justify-content:center;
              width:36px;height:36px;color:var(--ink-600);text-decoration:none;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
    </a>
    <span class="app-mark">
      <span class="app-mark-square"></span>
      pump<span style="color:var(--saffron-600)">vision</span>
    </span>
    <a href="{{ url_for('attendant.profile') }}"
       style="display:flex;align-items:center;justify-content:center;
              width:36px;height:36px;color:var(--ink-500);text-decoration:none;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </a>
  </div>

  <!-- Heading -->
  <div style="padding:4px 20px 16px;">
    <h2 style="font-family:var(--font-serif);font-weight:400;font-size:1.875rem;
               letter-spacing:-0.01em;color:var(--ink-900);margin:0 0 4px;">
      Select customer
    </h2>
    <p style="font-family:var(--font-sans);font-size:13px;color:var(--ink-500);margin:0;">
      Choose an account to record the transaction.
    </p>
  </div>

  <!-- Search -->
  <div style="padding:0 20px 14px;">
    <div style="display:flex;align-items:center;gap:10px;
                background:var(--paper-100);border:1px solid var(--paper-300);
                border-radius:var(--r-card);padding:0 14px;height:46px;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="var(--ink-500)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           style="flex-shrink:0;">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search-input" type="text"
             placeholder="Search name, ID, or vehicle"
             oninput="renderCustomers()"
             style="flex:1;background:none;border:none;outline:none;
                    font-family:var(--font-sans);font-size:14px;color:var(--ink-900);">
    </div>
  </div>

  <!-- Filter chips -->
  <div style="padding:0 20px 16px;display:flex;gap:8px;">
    <button id="chip-recent"   onclick="setFilter('recent')"   class="chip-filter active">Recent</button>
    <button id="chip-frequent" onclick="setFilter('frequent')" class="chip-filter">Frequent</button>
    <button id="chip-all"      onclick="setFilter('all')"      class="chip-filter">All Accounts</button>
  </div>

  <!-- Section header -->
  <div style="padding:0 20px 10px;display:flex;align-items:center;justify-content:space-between;">
    <span class="eyebrow">Credit Customers</span>
    <span id="customer-count" class="eyebrow"></span>
  </div>

  <!-- Customer list -->
  <div id="customer-list" style="padding:0 20px;flex:1;overflow-y:auto;"></div>

</div>

<!-- Bottom nav -->
<nav class="bottom-nav">
  <a href="{{ url_for('attendant.home') }}" class="bottom-nav__item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    Home
  </a>
  <a href="{{ url_for('attendant.activity') }}" class="bottom-nav__item bottom-nav__item--active">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="12" width="4" height="8" rx="1"/>
      <rect x="10" y="6" width="4" height="14" rx="1"/>
      <rect x="17" y="9" width="4" height="11" rx="1"/>
    </svg>
    Activity
  </a>
  <a href="{{ url_for('attendant.profile') }}" class="bottom-nav__item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
    Profile
  </a>
</nav>

<script>
const CUSTOMERS = {{ customers | tojson }};
let currentFilter = 'recent';

function setFilter(filter) {
  currentFilter = filter;
  ['recent', 'frequent', 'all'].forEach(function (f) {
    var btn = document.getElementById('chip-' + f);
    if (f === filter) btn.classList.add('active');
    else btn.classList.remove('active');
  });
  renderCustomers();
}

function renderCustomers() {
  var q = (document.getElementById('search-input').value || '').toLowerCase();

  var filtered = CUSTOMERS.filter(function (c) {
    if (!q) return true;
    return (
      c.company_name.toLowerCase().includes(q) ||
      c.account_id.toLowerCase().includes(q) ||
      c.vehicles.some(function (v) { return v.toLowerCase().includes(q); })
    );
  });

  if (currentFilter === 'recent') {
    filtered.sort(function (a, b) { return b.last_txn_date.localeCompare(a.last_txn_date); });
  } else if (currentFilter === 'frequent') {
    filtered.sort(function (a, b) { return b.txn_count - a.txn_count; });
  } else {
    filtered.sort(function (a, b) { return a.company_name.localeCompare(b.company_name); });
  }

  document.getElementById('customer-count').textContent = filtered.length + ' found';

  var chevronSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--ink-400)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
  var lockSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--error-600)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';

  var html = filtered.map(function (c) {
    var href    = c.is_active ? '/attendant/credit/log/' + c.id : '#';
    var opacity = c.is_active ? '1' : '0.5';
    var cursor  = c.is_active ? 'pointer' : 'default';
    var subColor = c.is_active ? 'var(--ink-500)' : 'var(--error-600)';
    var subText  = c.account_id + ' · ' + (c.is_active ? 'Credit Active' : 'Credit Blocked');
    var icon     = c.is_active ? chevronSvg : lockSvg;

    return '<a href="' + href + '" style="display:flex;align-items:center;gap:12px;' +
      'padding:14px 16px;' +
      'background:var(--paper-50);border:1px solid var(--paper-300);' +
      'border-radius:var(--r-card);text-decoration:none;margin-bottom:8px;' +
      'opacity:' + opacity + ';cursor:' + cursor + ';">' +
      '<div style="width:40px;height:40px;border-radius:50%;background:' + c.color + ';' +
        'display:flex;align-items:center;justify-content:center;' +
        'font-family:var(--font-sans);font-weight:700;font-size:13px;' +
        'color:#fff;flex-shrink:0;">' + c.initials + '</div>' +
      '<div style="flex:1;min-width:0;">' +
        '<div style="font-family:var(--font-sans);font-weight:600;font-size:14px;' +
          'color:var(--ink-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + c.company_name + '</div>' +
        '<div style="font-family:var(--font-sans);font-size:11px;color:' + subColor + ';margin-top:2px;">' + subText + '</div>' +
      '</div>' +
      '<div style="flex-shrink:0;">' + icon + '</div>' +
      '</a>';
  }).join('');

  document.getElementById('customer-list').innerHTML = html ||
    '<div style="text-align:center;padding:40px 0;color:var(--ink-500);' +
      'font-family:var(--font-sans);font-size:14px;">No customers found.</div>';
}

renderCustomers();
</script>
{% endblock %}
