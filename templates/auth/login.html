{% extends "base.html" %}
{% block title %}Login — PumpVision{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center -mt-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">⛽</div>
      <h1 class="text-2xl font-bold text-gray-800">PumpVision</h1>
      <p class="text-gray-500 text-sm mt-1">Shree Petroleum · RO 206858</p>
    </div>
    <form method="POST" action="{{ url_for('auth.login') }}" class="bg-white rounded-2xl shadow-lg p-6 space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" name="username" autocomplete="username" required
               class="w-full border border-gray-300 rounded-lg px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-indigo-500"
               placeholder="Enter username">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" autocomplete="current-password" required
               class="w-full border border-gray-300 rounded-lg px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-indigo-500"
               placeholder="Enter password">
      </div>
      <button type="submit"
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg text-base">
        Log In
      </button>
    </form>
  </div>
</div>
{% endblock %}
